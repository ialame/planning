# ===============================================
# AUTHENTIK OAUTH2/OIDC CONFIGURATION
# Add these properties to your application.properties
# ===============================================

# OAuth2 Resource Server - JWT Validation
# The issuer-uri is used to fetch the JWKS for token validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTHENTIK_ISSUER_URI:https://auth.pcagrade.com/application/o/pokemon-planning/}

# Explicit JWKS URI (optional, auto-discovered from issuer-uri)
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTHENTIK_ISSUER_URI}jwks/

# JWT Audience validation (optional)
# spring.security.oauth2.resourceserver.jwt.audiences=pokemon-planning

# ===============================================
# ENVIRONMENT VARIABLES NEEDED
# ===============================================
# AUTHENTIK_ISSUER_URI=https://auth.pcagrade.com/application/o/pokemon-planning/
